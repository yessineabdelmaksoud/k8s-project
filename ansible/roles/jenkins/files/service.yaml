apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
spec:
  type: NodePort
  ports:
    - name: web
      port: 8080
      targetPort: 8080
      nodePort: 32000
      protocol: TCP
    - name: agent
      port: 50000
      targetPort: 50000
      nodePort: 32500
      protocol: TCP
  selector:
    app: jenkins
