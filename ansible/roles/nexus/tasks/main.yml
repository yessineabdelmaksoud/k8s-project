# =============================================================================
# Role: nexus — Deploy Nexus container on services VM
# =============================================================================
---

# 1. Create Nexus data directory
- name: Create Nexus data directory
  ansible.builtin.file:
    path: /srv/nexus
    state: directory
    mode: "0755"

# 2. Set Nexus directory ownership (uid=200, gid=200)
- name: Set /srv/nexus owner to uid=200 gid=200
  ansible.builtin.file:
    path: /srv/nexus
    owner: "200"
    group: "200"
    recurse: true

# 3. Start Nexus container
- name: Start Nexus container
  community.docker.docker_container:
    name: nexus
    image: sonatype/nexus3:latest
    state: started
    restart_policy: always
    timeout: 300
    ports:
      - "8081:8081"
    volumes:
      - /srv/nexus:/nexus-data

# 4. Wait for Nexus to be ready
- name: Wait for Nexus to be ready
  ansible.builtin.uri:
    url: http://localhost:8081
    status_code: 200
    method: GET
  register: nexus_result
  until: nexus_result.status == 200
  retries: 30
  delay: 15
