# =============================================================================
# Role: containerd — Install and configure the container runtime
# =============================================================================
# Installs containerd, generates a default config, enables SystemdCgroup,
# and ensures the service is running and enabled.
# =============================================================================
---

# ---------- 1. Install containerd --------------------------------------------
- name: Install containerd package
  ansible.builtin.apt:
    name: containerd
    state: present
    update_cache: true
    cache_valid_time: 3600

# ---------- 2. Ensure config directory exists ---------------------------------
- name: Create /etc/containerd directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

# ---------- 3. Generate default containerd config ----------------------------
- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  notify: Restart containerd

# ---------- 4. Enable SystemdCgroup in containerd config ----------------------
- name: Enable SystemdCgroup in containerd config
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup\s*=\s*false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd

# ---------- 5. Enable and start containerd service ----------------------------
- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true
