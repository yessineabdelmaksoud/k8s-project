# =============================================================================
# Role: jenkins — Deploy Jenkins as a K8s pod in jenkins namespace
# =============================================================================
# Runs on: masters (become: false, as vagrant user with kubectl)
# =============================================================================
---

# 1. Copy manifest files to master
- name: Create Jenkins manifests directory
  ansible.builtin.file:
    path: /tmp/k8s-jenkins
    state: directory
    mode: "0755"

- name: Copy Jenkins manifest files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /tmp/k8s-jenkins/
  loop:
    - namespace.yaml
    - serviceaccount.yaml
    - pv.yaml
    - pvc.yaml
    - deployment.yaml
    - service.yaml

# 2. Apply manifests in order
- name: Apply Jenkins namespace
  ansible.builtin.command: kubectl apply -f /tmp/k8s-jenkins/namespace.yaml
  changed_when: true

- name: Apply Jenkins ServiceAccount and ClusterRoleBinding
  ansible.builtin.command: kubectl apply -f /tmp/k8s-jenkins/serviceaccount.yaml
  changed_when: true

- name: Apply Jenkins PersistentVolume
  ansible.builtin.command: kubectl apply -f /tmp/k8s-jenkins/pv.yaml
  changed_when: true

- name: Apply Jenkins PersistentVolumeClaim
  ansible.builtin.command: kubectl apply -f /tmp/k8s-jenkins/pvc.yaml
  changed_when: true

- name: Apply Jenkins Service
  ansible.builtin.command: kubectl apply -f /tmp/k8s-jenkins/service.yaml
  changed_when: true

- name: Apply Jenkins Deployment
  ansible.builtin.command: kubectl apply -f /tmp/k8s-jenkins/deployment.yaml
  changed_when: true

# 3. Wait for Jenkins to be ready
- name: Wait for Jenkins Deployment to be ready
  ansible.builtin.command: kubectl rollout status deployment/jenkins -n jenkins --timeout=300s
  changed_when: false
